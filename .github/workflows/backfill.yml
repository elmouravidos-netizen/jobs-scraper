name: Translate Backfill (Run Once)

on:
  workflow_dispatch:  # Manual trigger only — never runs automatically

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # backfill can take longer than normal scrape

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase==2.9.1 httpx==0.27.0

      - name: 🤖 Run Translation Backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python translate_backfill.py

      - name: 📊 Done
        if: always()
        run: echo "Backfill finished at $(date -u)"
