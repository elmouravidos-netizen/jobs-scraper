name: International Visa Jobs Scraper

on:
  schedule:
    # Runs once daily at 5am UTC — visa-sponsored jobs change
    # slower than regional jobs, and this is respectful to the
    # smaller source site (visasponsor.jobs) vs hitting it 4x/day
    - cron: '0 5 * * *'
  workflow_dispatch:  # manual trigger button in GitHub UI

jobs:
  scrape-international:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎭 Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: 🌍 Run International Jobs Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scraper_intl.py

      - name: 📊 Report Status
        if: always()
        run: echo "International scraper finished at $(date -u)"
