name: MENA Description Backfill
on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours (was twice/day) — concurrent
                             # scraping makes each run much faster now, so
                             # we can afford to run more often and clear
                             # the backlog faster. Previously: '30 6,18 * * *'
  workflow_dispatch:
concurrency:
  group: mena-description-backfill
  cancel-in-progress: false
jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 🎭 Install Playwright Chromium
        run: python -m playwright install chromium --with-deps
      - name: 🚀 Run Description Backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python backfill_mena_descriptions.py
      - name: 📊 Report Status
        if: always()
        run: echo "Backfill finished at $(date -u)"
